services:
  sendspin:
    image: ghcr.io/sendspin-protocol/sendspin-docker:latest
    build: .
    container_name: sendspin-receiver
    network_mode: host
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - "${AUDIO_GID:-29}"
    volumes:
      - sendspin-config:/home/sendspin/.config/sendspin
    restart: unless-stopped
    environment:
      SENDSPIN_NAME:            "${SENDSPIN_NAME:-Sendspin Speaker}"
      SENDSPIN_AUDIO_DEVICE:    "${SENDSPIN_AUDIO_DEVICE:-}"
      SENDSPIN_PORT:            "${SENDSPIN_PORT:-8927}"
      SENDSPIN_LOG_LEVEL:       "${SENDSPIN_LOG_LEVEL:-INFO}"
      SENDSPIN_HARDWARE_VOLUME: "${SENDSPIN_HARDWARE_VOLUME:-true}"
      SENDSPIN_SERVER_URL:      "${SENDSPIN_SERVER_URL:-}"
      SENDSPIN_AUDIO_FORMAT:    "${SENDSPIN_AUDIO_FORMAT:-}"
      SENDSPIN_STATIC_DELAY_MS: "${SENDSPIN_STATIC_DELAY_MS:-}"
      SENDSPIN_CLIENT_ID:       "${SENDSPIN_CLIENT_ID:-}"
      SENDSPIN_HOOK_START:      "${SENDSPIN_HOOK_START:-}"
      SENDSPIN_HOOK_STOP:       "${SENDSPIN_HOOK_STOP:-}"
      SENDSPIN_HOOK_SET_VOLUME: "${SENDSPIN_HOOK_SET_VOLUME:-}"
      SENDSPIN_MANUFACTURER:    "${SENDSPIN_MANUFACTURER:-}"
      SENDSPIN_PRODUCT_NAME:    "${SENDSPIN_PRODUCT_NAME:-}"
      SENDSPIN_DOCKER_VERSION:  "${SENDSPIN_DOCKER_VERSION:-local}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sendspin-config:
